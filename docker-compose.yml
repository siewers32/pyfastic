services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  redis:
      image: redis:7-alpine
      container_name: pyfastic-redis
      ports:
        - "6379:6379"
  
  # worker:
  #     build: .
  #     container_name: pyfastic-worker
  #     command: uv run python -m celery -A pyfastic.celery_app worker --loglevel=info
  #     volumes:
  #       - .:/app
  #       - /app/.venv  # <--- VOEG DIT TOE (Anonymous Volume)
  #     environment:
  #       - PYTHONPATH=/app/src  # <--- VOEG DIT TOE
  #       - UV_LINK_MODE=copy
  #       - POSTGRES_SERVER=db
  #       - REDIS_HOST=redis
  #     env_file:
  #       - .env
  #     depends_on:
  #       - db
  #       - redis

  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - "8083:8080"
    depends_on:
      - db

volumes:
  postgres_data:
    driver: local