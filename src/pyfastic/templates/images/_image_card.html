<div class="full-generated-image">
    <img src="{{ url_for('storage', path='/' + image.image_url) }}" alt="{{ image.name }}">
    <ul>
        <li><strong>Prompt:</strong> {{ image.prompt }}</li>
        <li><strong>Naam:</strong> {{ image.name }}</li>
        <li><strong>Afbeelding ID:</strong> {{ image.id }}</li>
    </ul>
</div>
